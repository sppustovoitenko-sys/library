{% extends 'base.html' %}

{% block content %}

<h1>Бібліотека</h1>

<h2>Додати книгу</h2>
<form method="POST" action="{{ url_for('add_book') }}">
    <input name="title" placeholder="Назва" required>
    <input name="author" placeholder="Автор" required>
    <input name="year" placeholder="Рік" required>
    <input name="image_url" placeholder="URL картинки">
    <textarea name="description" placeholder="Опис"></textarea>
    <button type="submit">Додати</button>
</form>

<h2>Список книг</h2>

<div class="books">
{% for book in books %}
    <div class="book">
        <h3>{{ book[1] }}</h3>
        <p>{{ book[2] }}</p>
        <p>{{ book[4] }}</p>

        {% if book[5] %}
        <img src="{{ book[5] }}" width="100">
        {% endif %}

        <br>
        <a href="{{ url_for('book_detail', id=book[0]) }}">Детальніше</a>
        <a href="{{ url_for('delete_book', id=book[0]) }}">Видалити</a>
    </div>
{% endfor %}
</div>

{% endblock %}
